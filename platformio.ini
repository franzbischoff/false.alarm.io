; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
description = Model Implementation of 'false.alarm'
src_dir = src
lib_dir = lib
build_cache_dir = .cache
build_dir = build
default_envs = native

[env]
lib_ldf_mode = chain+
lib_compat_mode = strict
monitor_speed = 115200
check_skip_packages = yes

[env:esp32_prod]
platform = espressif32
framework = espidf
board = sparkfun_esp32_iot_redboard
board_build.sdkconfig_defaults = sdkconfig.defaults.prod
build_type = release
build_unflags =
	-Os
	-Og
build_flags =
; Selected by A/B benchmark as best production runtime option
	-O2
	-Wall -fdiagnostics-color=always
build_src_flags =
	; Log level used by app_main/tag main
	-DMAIN_LOG_LEVEL=ESP_LOG_INFO
	; Acquisition/sample rate in Hz for producer task timing
	-DSAMPLING_RATE_HZ=250
	; MPX sliding window size
	-DWINDOW_SIZE=210
	; MPX history depth in seconds
	-DHISTORY_SIZE_S=20
	; Threshold used for alert trigger on FLOSS probe index
	-DFLOSS_ALERT_THRESHOLD=0.45F
	; Enable periodic debug logging in processing task (0/1)
	-DAPP_DEBUG_OUTPUT=0
	; Number of processed samples between debug logs
	-DDEBUG_LOG_EVERY_N_SAMPLES=25
	; Signal source backend: 0=SD CSV, 1=ADC, 2=I2C
	-DSIGNAL_SOURCE_KIND=0
	; SD mount point used for source/logging
	-DSD_INPUT_MOUNT_POINT=\"/sdcard\"
	; Preferred SD CSV signal file path
	-DSD_INPUT_FILE_PRIMARY=\"/sdcard/test_data.csv\"
	; Fallback SD CSV path (8.3 filename)
	-DSD_INPUT_FILE_FALLBACK=\"/sdcard/TEST_D~1.CSV\"
	; SD SPI pins (SDSPI mode)
	-DSD_SPI_MISO_PIN=GPIO_NUM_19
	; SD SPI pins (SDSPI mode)
	-DSD_SPI_MOSI_PIN=GPIO_NUM_23
	; SD SPI pins (SDSPI mode)
	-DSD_SPI_SCK_PIN=GPIO_NUM_18
	; SD SPI pins (SDSPI mode)
	-DSD_SPI_CS_PIN=GPIO_NUM_5
	; ADC channel used when SIGNAL_SOURCE_KIND=1
	-DANALOG_INPUT_CHANNEL=ADC1_CHANNEL_6
	; I2C SDA pin used when SIGNAL_SOURCE_KIND=2
	-DI2C_SENSOR_SDA_PIN=GPIO_NUM_21
	; I2C SCL pin used when SIGNAL_SOURCE_KIND=2
	-DI2C_SENSOR_SCL_PIN=GPIO_NUM_22
	; I2C bus frequency in Hz
	-DI2C_SENSOR_FREQUENCY_HZ=400000
	; Enable SD logging of processed values (0/1)
	-DLOG_TO_SD_ENABLED=0
	; Queue capacity between acquisition and processing tasks
	-DRING_BUFFER_CAPACITY_SAMPLES=500
	; Number of samples consumed per MPX compute call
	-DMPX_BATCH_SIZE=128 # <= 16 causes dropouts; 128 is ok
	; Core affinity for acquisition task
	-DTASK_ACQ_CORE=0
	; Core affinity for processing task
	-DTASK_PROC_CORE=1
	; Core affinity for monitor task
	-DTASK_MON_CORE=0
	; Acquisition task priority
	-DTASK_ACQ_PRIORITY=4
	; Processing task priority
	-DTASK_PROC_PRIORITY=3
	; Monitor task priority
	-DTASK_MON_PRIORITY=1
	; Acquisition task stack size in bytes
	-DTASK_ACQ_STACK_BYTES=8192
	; Processing task stack size in bytes
	-DTASK_PROC_STACK_BYTES=16384
	; Monitor task stack size in bytes
	-DTASK_MON_STACK_BYTES=6144
	; Enable monitor task with runtime counters (0/1)
	-DENABLE_MONITOR_TASK=1
	; Monitor reporting period in milliseconds
	-DDEBUG_MONITOR_PERIOD_MS=1000
	; Serial plot output mode (0/1) - prints sample,floss per line
	-DSERIAL_PLOT_MODE=0
	; Downsample factor for serial plot output
	-DSERIAL_PLOT_EVERY_N=15
	; Serial plot format: 0=legacy CSV, 1=Teleplot var:value per line
	-DSERIAL_PLOT_TELEPLOT_FORMAT=0
	; Include min FLOSS index/value calculation and output in serial plot (0/1)
	-DSERIAL_PLOT_INCLUDE_MIN_FLOSS=0
	; Cooperative delay in processing task loop (ms)
	-DPROCESS_TASK_COOPERATIVE_DELAY_MS=0
monitor_speed = 115200
monitor_filters =
	esp32_exception_decoder
	time
upload_speed = 921600

