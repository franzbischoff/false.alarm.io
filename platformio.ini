; 	clangtidy: --config-file=.clang-tidy
; 	pvs-studio: --exclude-path=.pio --analysis-mode=62 --platform=arm --errors-off=V2005,V2575,V2533,V2511,V2563,V2600,V2578,V2506,V3163,V3164,V3551,V3539,V3549,V3554

[env:esp32_prod]
platform = espressif32
framework = espidf
board = sparkfun_esp32_iot_redboard
build_type = debug
build_flags =
	-Wall -fdiagnostics-color=always
build_src_flags =
	-DMAIN_LOG_LEVEL=ESP_LOG_INFO
	-DSAMPLING_RATE_HZ=250
	-DWINDOW_SIZE=100
	-DHISTORY_SIZE_S=20
	-DFLOSS_ALERT_THRESHOLD=0.45F
	-DAPP_DEBUG_OUTPUT=1
	-DDEBUG_LOG_EVERY_N_SAMPLES=25
	-DSIGNAL_SOURCE_KIND=0
	-DSD_INPUT_MOUNT_POINT=\"/sdcard\"
	-DSD_INPUT_FILE_PRIMARY=\"/sdcard/test_data.csv\"
	-DSD_INPUT_FILE_FALLBACK=\"/sdcard/TEST_D~1.CSV\"
	-DSD_SPI_MISO_PIN=GPIO_NUM_19
	-DSD_SPI_MOSI_PIN=GPIO_NUM_23
	-DSD_SPI_SCK_PIN=GPIO_NUM_18
	-DSD_SPI_CS_PIN=GPIO_NUM_5
	-DANALOG_INPUT_CHANNEL=ADC1_CHANNEL_6
	-DI2C_SENSOR_SDA_PIN=GPIO_NUM_21
	-DI2C_SENSOR_SCL_PIN=GPIO_NUM_22
	-DI2C_SENSOR_FREQUENCY_HZ=400000
	-DLOG_TO_SD_ENABLED=0
	-DRING_BUFFER_CAPACITY_SAMPLES=500
	-DMPX_BATCH_SIZE=16
	-DTASK_ACQ_CORE=0
	-DTASK_PROC_CORE=1
	-DTASK_MON_CORE=1
	-DTASK_ACQ_PRIORITY=4
	-DTASK_PROC_PRIORITY=3
	-DTASK_MON_PRIORITY=1
	-DTASK_ACQ_STACK_BYTES=8192
	-DTASK_PROC_STACK_BYTES=16384
	-DTASK_MON_STACK_BYTES=6144
	-DENABLE_MONITOR_TASK=1
	-DDEBUG_MONITOR_PERIOD_MS=2000
	-DSERIAL_PLOT_MODE=0
	-DSERIAL_PLOT_EVERY_N=1
monitor_speed = 115200
monitor_filters =
	esp32_exception_decoder
	time
upload_speed = 921600
test_port = COM10
test_speed = 115200

[env:native]
platform = native
test_framework = unity
lib_compat_mode = off
build_flags = -Wall -fdiagnostics-color=always

[env:esp32_test]
platform = espressif32
framework = espidf
board = sparkfun_esp32_iot_redboard
test_framework = unity
build_type = debug
build_flags =
	-DUSE_SD_CARD=1
	-Wall -fdiagnostics-color=always
build_src_flags = -DMAIN_LOG_LEVEL=ESP_LOG_INFO
monitor_speed = 115200
monitor_filters =
	esp32_exception_decoder
	time
upload_speed = 921600
test_port = COM10
test_speed = 115200
